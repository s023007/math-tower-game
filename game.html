<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">
<title>اللعبة</title>

<style>

body{
background:#1e293b;
color:white;
text-align:center;
font-family:Arial;
}

#game{
width:400px;
height:600px;
background:#0f172a;
margin:auto;
position:relative;
overflow:hidden;
}

.player{
width:40px;
height:40px;
background:orange;
position:absolute;
bottom:10px;
left:180px;
}

.platform{
width:100px;
height:10px;
background:white;
position:absolute;
}

</style>

</head>

<body>

<h2>مغامرة المستكشف</h2>

<div id="game">

<div class="player" id="player"></div>

<div class="platform" style="bottom:100px;left:150px"></div>
<div class="platform" style="bottom:200px;left:50px"></div>
<div class="platform" style="bottom:300px;left:200px"></div>
<div class="platform" style="bottom:400px;left:120px"></div>

</div>

<p>النقاط: <span id="score">0</span></p>

<script>

let player=document.getElementById("player")

document.addEventListener("keydown",move)

function move(e){

let left=player.offsetLeft

if(e.key=="ArrowLeft"){
player.style.left=(left-20)+"px"
}

if(e.key=="ArrowRight"){
player.style.left=(left+20)+"px"
}

}

</script>

</body>
</html>
