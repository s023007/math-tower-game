<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مرحلة التحدي</title>
  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    :root{
      --bg1:#06142f;
      --bg2:#081d43;
      --card:#102858;
      --card2:#17356f;
      --line:rgba(255,255,255,.08);
      --text:#ffffff;
      --muted:#d9e2f7;
      --gold:#ffbf00;
      --gold2:#ffd860;
      --green:#8bf0a7;
      --red:#ff8a8a;
      --blue:#89c3ff;
      --shadow:0 18px 40px rgba(0,0,0,.30);
    }

    body{
      font-family:Arial,sans-serif;
      min-height:100vh;
      background:linear-gradient(180deg,var(--bg2),var(--bg1));
      color:var(--text);
    }

    .page{
      width:94%;
      max-width:850px;
      margin:0 auto;
      padding:16px 0 30px;
    }

    .topbar{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-bottom:14px;
    }

    .top-card{
      background:linear-gradient(180deg,var(--card2),var(--card));
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px;
      box-shadow:var(--shadow);
    }

    .top-card .label{
      color:#bcd0fb;
      font-size:13px;
      margin-bottom:6px;
    }

    .top-card .value{
      font-size:20px;
      font-weight:700;
    }

    .main-card{
      background:linear-gradient(180deg,var(--card2),var(--card));
      border:1px solid var(--line);
      border-radius:26px;
      padding:16px;
      box-shadow:var(--shadow);
    }

    .game-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:14px;
      flex-wrap:wrap;
    }

    .game-title{
      font-size:28px;
      font-weight:800;
    }

    .small-badges{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .badge{
      background:rgba(255,255,255,.06);
      border:1px solid var(--line);
      padding:8px 12px;
      border-radius:999px;
      color:#e7eeff;
      font-size:14px;
    }

    .scene{
      position:relative;
      height:360px;
      border-radius:24px;
      overflow:hidden;
      border:1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02)),
        url("images/tower_game_scene.png") center/cover no-repeat;
      margin-bottom:16px;
    }

    .scene-overlay{
      position:absolute;
      inset:0;
      background:linear-gradient(180deg, rgba(6,20,47,.18), rgba(6,20,47,.28));
    }

    .platform{
      position:absolute;
      height:16px;
      background:linear-gradient(180deg,#c7ced9,#8d97a7);
      border-radius:12px;
      box-shadow:inset 0 2px 0 rgba(255,255,255,.35), 0 4px 10px rgba(0,0,0,.18);
      z-index:2;
    }

    .p1{ width:110px; right:20px; bottom:52px; }
    .p2{ width:120px; right:150px; bottom:118px; }
    .p3{ width:100px; right:40px; bottom:182px; }
    .p4{ width:120px; right:180px; bottom:252px; }
    .p5{ width:95px; right:60px; bottom:314px; }

    .player{
      position:absolute;
      width:42px;
      height:62px;
      right:52px;
      bottom:66px;
      z-index:3;
      transition:all .45s ease;
    }

    .player .head{
      width:26px;
      height:26px;
      background:#ffd68f;
      border-radius:50%;
      margin:0 auto -2px;
      position:relative;
      z-index:2;
      border:2px solid rgba(0,0,0,.08);
    }

    .player .hat{
      position:absolute;
      top:-4px;
      left:50%;
      transform:translateX(-50%);
      width:34px;
      height:14px;
      background:#c28b2c;
      border-radius:16px 16px 8px 8px;
      z-index:3;
    }

    .player .body{
      width:34px;
      height:32px;
      margin:0 auto;
      background:#d5922e;
      border-radius:10px;
      border:2px solid rgba(0,0,0,.08);
    }

    .player .legs{
      display:flex;
      justify-content:center;
      gap:6px;
      margin-top:2px;
    }

    .player .legs span{
      display:block;
      width:6px;
      height:12px;
      background:#3f2d19;
      border-radius:4px;
    }

    .goal{
      position:absolute;
      left:18px;
      top:16px;
      z-index:2;
      background:rgba(0,0,0,.26);
      border:1px solid rgba(255,255,255,.12);
      color:#fff4c2;
      padding:10px 14px;
      border-radius:16px;
      font-size:14px;
      box-shadow:var(--shadow);
    }

    .progress-wrap{
      margin-top:4px;
      margin-bottom:12px;
    }

    .progress-label{
      display:flex;
      justify-content:space-between;
      margin-bottom:8px;
      color:#dfe8ff;
      font-size:14px;
    }

    .progress{
      width:100%;
      height:12px;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      overflow:hidden;
      border:1px solid var(--line);
    }

    .progress-bar{
      height:100%;
      width:0%;
      background:linear-gradient(90deg,var(--gold2),var(--gold));
      transition:width .3s ease;
    }

    .question-card{
      background:rgba(255,255,255,.05);
      border:1px solid var(--line);
      border-radius:22px;
      padding:18px;
      margin-top:10px;
    }

    .question-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:12px;
      flex-wrap:wrap;
    }

    .question-number{
      font-size:16px;
      color:#e8efff;
      font-weight:700;
    }

    .timer{
      padding:8px 14px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid var(--line);
      color:#fff1b8;
      font-weight:700;
    }

    .question-text{
      font-size:24px;
      line-height:1.9;
      margin-bottom:16px;
    }

    .options{
      display:grid;
      gap:12px;
    }

    .option-btn{
      width:100%;
      padding:16px;
      border:none;
      border-radius:18px;
      font-size:24px;
      font-weight:700;
      cursor:pointer;
      background:#f4f6fb;
      color:#111;
      transition:.15s ease;
    }

    .option-btn:hover{
      transform:translateY(-1px);
    }

    .option-btn.correct{
      background:var(--green);
      color:#103d1f;
    }

    .option-btn.wrong{
      background:#ffd1d1;
      color:#4e0f0f;
    }

    .status{
      margin-top:14px;
      min-height:28px;
      font-size:16px;
      line-height:1.8;
    }

    .status.good{ color:#bff9cb; }
    .status.bad{ color:#ffd1d1; }

    .finish-card{
      display:none;
      background:linear-gradient(180deg,var(--card2),var(--card));
      border:1px solid var(--line);
      border-radius:26px;
      padding:24px 18px;
      margin-top:16px;
      box-shadow:var(--shadow);
      text-align:center;
    }

    .finish-card h2{
      font-size:34px;
      margin-bottom:10px;
    }

    .finish-score{
      font-size:44px;
      color:var(--gold2);
      font-weight:800;
      margin:12px 0;
    }

    .finish-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-top:16px;
    }

    .finish-box{
      background:rgba(255,255,255,.05);
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px;
    }

    .finish-box .t1{
      color:#c9d6f4;
      font-size:14px;
      margin-bottom:6px;
    }

    .finish-box .t2{
      font-size:24px;
      font-weight:800;
    }

    .finish-actions{
      display:grid;
      gap:12px;
      margin-top:18px;
    }

    .action-btn{
      width:100%;
      border:none;
      border-radius:18px;
      padding:15px;
      font-size:20px;
      font-weight:800;
      cursor:pointer;
    }

    .play-again{
      background:linear-gradient(180deg,var(--gold2),var(--gold));
      color:#111;
    }

    .back-home{
      background:#ecf1fb;
      color:#111;
    }

    @media (max-width:600px){
      .topbar{
        grid-template-columns:1fr;
      }

      .question-text{
        font-size:20px;
      }

      .option-btn{
        font-size:22px;
      }

      .finish-grid{
        grid-template-columns:1fr;
      }

      .scene{
        height:320px;
      }

      .game-title{
        font-size:24px;
      }
    }
  </style>
</head>
<body>
  <div class="page">

    <div class="topbar">
      <div class="top-card">
        <div class="label">الطالب</div>
        <div class="value" id="playerName">—</div>
      </div>
      <div class="top-card">
        <div class="label">الصف</div>
        <div class="value" id="playerClass">—</div>
      </div>
    </div>

    <div class="main-card" id="gameCard">
      <div class="game-header">
        <div class="game-title">مرحلة التحدي</div>
        <div class="small-badges">
          <div class="badge">النقاط: <span id="score">٠</span></div>
          <div class="badge">المحاولة: <span id="attemptView">١</span> / ٣</div>
        </div>
      </div>

      <div class="scene">
        <div class="scene-overlay"></div>

        <div class="goal">🏁 الوصول إلى القمة</div>

        <div class="platform p1"></div>
        <div class="platform p2"></div>
        <div class="platform p3"></div>
        <div class="platform p4"></div>
        <div class="platform p5"></div>

        <div class="player" id="player">
          <div class="hat"></div>
          <div class="head"></div>
          <div class="body"></div>
          <div class="legs"><span></span><span></span></div>
        </div>
      </div>

      <div class="progress-wrap">
        <div class="progress-label">
          <span>تقدم الجولة</span>
          <span id="progressText">٠ / ٥</span>
        </div>
        <div class="progress">
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </div>

      <div class="question-card">
        <div class="question-top">
          <div class="question-number" id="questionNumber">السؤال ١ من ٥</div>
          <div class="timer">الوقت: <span id="timeLeft">٣٠</span> ثانية</div>
        </div>

        <div class="question-text" id="questionText">...</div>

        <div class="options" id="optionsBox"></div>

        <div class="status" id="statusText"></div>
      </div>
    </div>

    <div class="finish-card" id="finishCard">
      <h2>انتهت المحاولة</h2>
      <div class="finish-score" id="finalScore">٠</div>

      <div class="finish-grid">
        <div class="finish-box">
          <div class="t1">إجابات صحيحة</div>
          <div class="t2" id="correctCount">٠</div>
        </div>
        <div class="finish-box">
          <div class="t1">أفضل نتيجة لك</div>
          <div class="t2" id="bestScore">٠</div>
        </div>
        <div class="finish-box">
          <div class="t1">المحاولات المستخدمة</div>
          <div class="t2" id="usedAttempts">٠</div>
        </div>
        <div class="finish-box">
          <div class="t1">المتبقي من المحاولات</div>
          <div class="t2" id="remainingAttempts">٠</div>
        </div>
      </div>

      <div class="finish-actions">
        <button class="action-btn play-again" id="playAgainBtn" onclick="restartAttempt()">محاولة جديدة</button>
        <button class="action-btn back-home" onclick="goHome()">العودة للصفحة الرئيسية</button>
      </div>
    </div>

  </div>

  <script>
    const questions = [
      {
        q: "بكم طريقة يمكن اختيار ٣ عناصر من ٧ عناصر؟",
        options: ["٣٥", "٢١", "٢١٠"],
        answer: "٣٥"
      },
      {
        q: "عدد تباديل ٣ عناصر من ٧ عناصر مختلفة:",
        options: ["٢١٠", "٣٥", "١٢٠"],
        answer: "٢١٠"
      },
      {
        q: "بكم طريقة يمكن اختيار ٢ طالبين من ٦ طلاب؟",
        options: ["١٥", "١٢", "٣٠"],
        answer: "١٥"
      },
      {
        q: "عدد تباديل ٤ عناصر من ٦ عناصر مختلفة:",
        options: ["٣٦٠", "١٥", "٧٢٠"],
        answer: "٣٦٠"
      },
      {
        q: "عدد الحدود في مفكوك (١ + س)^٥",
        options: ["٥", "٦", "٧"],
        answer: "٦"
      },
      {
        q: "مجموع معاملات مفكوك (١ + س)^٦",
        options: ["٣٢", "٦٤", "١٢٨"],
        answer: "٦٤"
      },
      {
        q: "عدد تباديل ٥ عناصر من ٧ عناصر مختلفة:",
        options: ["٢٥٢٠", "٨٤٠", "٢١"],
        answer: "٢٥٢٠"
      },
      {
        q: "بكم طريقة يمكن اختيار ٤ عناصر من ٨ عناصر؟",
        options: ["٧٠", "٥٦", "١٦٨٠"],
        answer: "٧٠"
      },
      {
        q: "عدد طرق ترتيب ٤ كتب مختلفة في صف واحد:",
        options: ["٢٤", "١٦", "٤"],
        answer: "٢٤"
      },
      {
        q: "عدد طرق ترتيب ٣ كتب من ٥ كتب مختلفة:",
        options: ["٦٠", "٢٠", "١٠"],
        answer: "٦٠"
      },
      {
        q: "عدد الحدود في مفكوك (١ + س)^٧",
        options: ["٧", "٨", "٩"],
        answer: "٨"
      },
      {
        q: "مجموع معاملات مفكوك (٢ص + ٣)^٤",
        options: ["٢٤", "٦٢٥", "١٢٩٦"],
        answer: "٦٢٥"
      }
    ];

    let selectedQuestions = [];
    let currentQuestion = 0;
    let score = 0;
    let timeLeft = 30;
    let timer = null;
    let correctAnswers = 0;
    let locked = false;

    const playerName = localStorage.getItem("playerName") || "طالب";
    const playerClass = localStorage.getItem("playerClass") || "—";
    document.getElementById("playerName").textContent = playerName;
    document.getElementById("playerClass").textContent = playerClass;

    function toArabicNumber(num){
      return String(num).replace(/\d/g, d => "٠١٢٣٤٥٦٧٨٩"[d]);
    }

    function getAttemptsKey(){
      const email = localStorage.getItem("playerEmail") || playerName;
      return "attempts_" + email;
    }

    function getBestKey(){
      const email = localStorage.getItem("playerEmail") || playerName;
      return "best_" + email;
    }

    function getUsedAttempts(){
      return parseInt(localStorage.getItem(getAttemptsKey()) || "0");
    }

    function setUsedAttempts(val){
      localStorage.setItem(getAttemptsKey(), String(val));
    }

    function getBestScore(){
      return parseInt(localStorage.getItem(getBestKey()) || "0");
    }

    function setBestScore(val){
      localStorage.setItem(getBestKey(), String(val));
    }

    function shuffle(array){
      let arr = [...array];
      for(let i = arr.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function movePlayer(step){
      const player = document.getElementById("player");
      const positions = [
        { right: 52, bottom: 66 },
        { right: 182, bottom: 132 },
        { right: 72, bottom: 196 },
        { right: 212, bottom: 266 },
        { right: 92, bottom: 328 }
      ];

      if(step < positions.length){
        player.style.right = positions[step].right + "px";
        player.style.bottom = positions[step].bottom + "px";
      }
    }

    function updateTopInfo(){
      document.getElementById("score").textContent = toArabicNumber(score);
      document.getElementById("attemptView").textContent = toArabicNumber(getUsedAttempts() + 1);
      document.getElementById("progressText").textContent = toArabicNumber(currentQuestion) + " / " + toArabicNumber(5);
      document.getElementById("progressBar").style.width = (currentQuestion / 5) * 100 + "%";
    }

    function startTimer(){
      clearInterval(timer);
      timeLeft = 30;
      document.getElementById("timeLeft").textContent = toArabicNumber(timeLeft);

      timer = setInterval(() => {
        timeLeft--;
        document.getElementById("timeLeft").textContent = toArabicNumber(timeLeft);

        if(timeLeft <= 0){
          clearInterval(timer);
          timeUp();
        }
      }, 1000);
    }

    function timeUp(){
      locked = true;
      document.getElementById("statusText").textContent = "انتهى الوقت. ننتقل إلى السؤال التالي.";
      document.getElementById("statusText").className = "status bad";

      setTimeout(() => {
        currentQuestion++;
        nextStep();
      }, 1100);
    }

    function loadQuestion(){
      locked = false;
      updateTopInfo();

      const q = selectedQuestions[currentQuestion];
      document.getElementById("questionNumber").textContent =
        "السؤال " + toArabicNumber(currentQuestion + 1) + " من " + toArabicNumber(5);

      document.getElementById("questionText").textContent = q.q;
      document.getElementById("statusText").textContent = "";
      document.getElementById("statusText").className = "status";

      const optionsBox = document.getElementById("optionsBox");
      optionsBox.innerHTML = "";

      q.options.forEach(option => {
        const btn = document.createElement("button");
        btn.className = "option-btn";
        btn.textContent = option;
        btn.onclick = () => checkAnswer(option, btn);
        optionsBox.appendChild(btn);
      });

      startTimer();
    }

    function checkAnswer(selected, btn){
      if(locked) return;
      locked = true;
      clearInterval(timer);

      const q = selectedQuestions[currentQuestion];
      const buttons = document.querySelectorAll(".option-btn");

      let gained = 0;
      if(selected === q.answer){
        if(timeLeft >= 25){
          gained = 15;
        } else if(timeLeft >= 20){
          gained = 10;
        } else if(timeLeft >= 10){
          gained = 7;
        } else {
          gained = 5;
        }

        score += gained;
        correctAnswers++;

        btn.classList.add("correct");
        document.getElementById("statusText").textContent =
          "إجابة صحيحة. حصلت على " + toArabicNumber(gained) + " نقاط.";
        document.getElementById("statusText").className = "status good";
      } else {
        btn.classList.add("wrong");
        buttons.forEach(b => {
          if(b.textContent === q.answer){
            b.classList.add("correct");
          }
        });

        document.getElementById("statusText").textContent =
          "إجابة غير صحيحة. الإجابة الصحيحة هي: " + q.answer;
        document.getElementById("statusText").className = "status bad";
      }

      setTimeout(() => {
        currentQuestion++;
        nextStep();
      }, 1300);
    }

    function nextStep(){
      updateTopInfo();

      if(currentQuestion < 5){
        movePlayer(currentQuestion);
        loadQuestion();
      } else {
        finishAttempt();
      }
    }

    function finishAttempt(){
      clearInterval(timer);

      let used = getUsedAttempts() + 1;
      setUsedAttempts(used);

      let best = getBestScore();
      if(score > best){
        best = score;
        setBestScore(score);
      }

      document.getElementById("gameCard").style.display = "none";
      document.getElementById("finishCard").style.display = "block";

      document.getElementById("finalScore").textContent = toArabicNumber(score);
      document.getElementById("correctCount").textContent = toArabicNumber(correctAnswers);
      document.getElementById("bestScore").textContent = toArabicNumber(best);
      document.getElementById("usedAttempts").textContent = toArabicNumber(used);
      document.getElementById("remainingAttempts").textContent = toArabicNumber(Math.max(0, 3 - used));

      const btn = document.getElementById("playAgainBtn");
      if(used >= 3){
        btn.disabled = true;
        btn.textContent = "انتهت المحاولات";
        btn.style.opacity = ".6";
        btn.style.cursor = "not-allowed";
      }
    }

    function restartAttempt(){
      if(getUsedAttempts() >= 3) return;
      window.location.reload();
    }

    function goHome(){
      window.location.href = "index.html";
    }

    function initGame(){
      if(getUsedAttempts() >= 3){
        document.getElementById("gameCard").style.display = "none";
        document.getElementById("finishCard").style.display = "block";
        document.getElementById("finalScore").textContent = "٠";
        document.getElementById("correctCount").textContent = "٠";
        document.getElementById("bestScore").textContent = toArabicNumber(getBestScore());
        document.getElementById("usedAttempts").textContent = toArabicNumber(getUsedAttempts());
        document.getElementById("remainingAttempts").textContent = "٠";

        const btn = document.getElementById("playAgainBtn");
        btn.disabled = true;
        btn.textContent = "انتهت المحاولات";
        btn.style.opacity = ".6";
        btn.style.cursor = "not-allowed";
        return;
      }

      selectedQuestions = shuffle(questions).slice(0, 5);
      updateTopInfo();
      movePlayer(0);
      loadQuestion();
    }

    initGame();
  </script>
</body>
</html>
