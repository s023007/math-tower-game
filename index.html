<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Explorer Math Tower</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(#0b1c3d,#07122a);
color:white;
text-align:center;
}

h1{
margin-top:30px;
font-size:38px;
}

h2{
margin-top:5px;
color:#ffd36b;
font-weight:normal;
}

.container{
width:90%;
max-width:500px;
margin:auto;
}

.form{
margin-top:30px;
}

input,select{
width:100%;
padding:14px;
margin:10px 0;
border-radius:10px;
border:none;
font-size:16px;
}

button{
width:100%;
padding:15px;
background:#ffb400;
border:none;
border-radius:12px;
font-size:18px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#ffc940;
}

.game-scene{

position:relative;
height:320px;
margin-top:40px;
border-radius:20px;
background:linear-gradient(#1b2f5c,#0c1738);
overflow:hidden;

}

/* البرج */

.tower{
position:absolute;
bottom:0;
left:50%;
transform:translateX(-50%);
width:110px;
height:240px;
background:linear-gradient(#9da3ad,#5f6672);
border-radius:12px;
}

/* المنصات */

.platform{
position:absolute;
width:90px;
height:18px;
background:#aab0bb;
border-radius:10px;
}

.p1{bottom:80px;left:40px;}
.p2{bottom:140px;left:180px;}
.p3{bottom:200px;left:100px;}

/* اللاعب */

.player{

position:absolute;
bottom:100px;
left:50px;
width:40px;
height:60px;
background:#ffd36b;
border-radius:10px;

}

/* الشجر */

.tree{
position:absolute;
bottom:0;
width:50px;
height:110px;
background:#2e7d32;
border-radius:20px;
}

.t1{left:10px;}
.t2{right:10px;}

/* صندوق الكنز */

.treasure{
position:absolute;
bottom:210px;
right:60px;
width:50px;
height:40px;
background:#b37a1f;
border-radius:6px;
}

/* العملات */

.coin{

position:absolute;
width:18px;
height:18px;
background:gold;
border-radius:50%;

}

.c1{bottom:110px;left:90px;}
.c2{bottom:170px;left:220px;}
.c3{bottom:230px;left:140px;}

.note{
margin-top:25px;
color:#c7d0ff;
font-size:15px;
}

</style>

</head>

<body>

<div class="container">

<h1>Explorer Math Tower</h1>
<h2>برج التحدي الرياضي</h2>

<div class="game-scene">

<div class="tower"></div>

<div class="platform p1"></div>
<div class="platform p2"></div>
<div class="platform p3"></div>

<div class="player"></div>

<div class="tree t1"></div>
<div class="tree t2"></div>

<div class="treasure"></div>

<div class="coin c1"></div>
<div class="coin c2"></div>
<div class="coin c3"></div>

</div>

<div class="form">

<input id="name" placeholder="اسم الطالب">

<input id="email" placeholder="البريد الإلكتروني">

<select id="class">

<option value="">اختر الصف</option>
<option>١١ / ٣</option>
<option>١١ / ٤</option>

</select>

<button onclick="startGame()">ابدأ اللعب</button>

</div>

<p class="note">
أجب بسرعة للحصول على أعلى النقاط
</p>

</div>

<script>

function startGame(){

let name=document.getElementById("name").value;
let email=document.getElementById("email").value;
let cls=document.getElementById("class").value;

if(name=="" || email=="" || cls==""){
alert("أدخل جميع البيانات");
return;
}

let emails=JSON.parse(localStorage.getItem("emails")||"[]");

if(emails.includes(email)){
alert("هذا البريد مسجل مسبقاً");
return;
}

emails.push(email);

localStorage.setItem("emails",JSON.stringify(emails));

localStorage.setItem("player",name);
localStorage.setItem("class",cls);

alert("تم التسجيل بنجاح");

window.location="game.html";

}

</script>

</body>
</html>
