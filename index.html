
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>صور لعبة برج التحدي</title>
<style>
body{font-family:Arial;background:#0f172a;color:white;text-align:center;padding:30px}
h1{margin-bottom:30px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px}
img{width:100%;border-radius:15px;box-shadow:0 10px 30px rgba(0,0,0,0.5)}
.card{background:#1e293b;padding:15px;border-radius:15px}
</style>
</head>
<body>
<h1>صور لعبة برج التحدي</h1>
<div class="grid">

    <div class="card">
        <img src="tower_main.png">
        <p>tower_main.png</p>
    </div>
    
    <div class="card">
        <img src="tower_treasure.png">
        <p>tower_treasure.png</p>
    </div>
    
    <div class="card">
        <img src="tower_path.png">
        <p>tower_path.png</p>
    </div>
    
    <div class="card">
        <img src="tower_forest.png">
        <p>tower_forest.png</p>
    </div>
    
    <div class="card">
        <img src="tower_game_scene.png">
        <p>tower_game_scene.png</p>
    </div>
    
</div>
</body>
</html>
