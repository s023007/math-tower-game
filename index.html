<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Explorer Math Tower</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(#081631,#020c22);
color:white;
text-align:center;
}

.container{
width:90%;
max-width:500px;
margin:auto;
}

h1{
margin-top:30px;
font-size:36px;
}

h2{
margin-top:5px;
color:#ffd36b;
font-weight:normal;
}

.game-preview{
margin-top:30px;
position:relative;
height:260px;
border-radius:20px;
overflow:hidden;
}

.game-preview img{
width:100%;
border-radius:20px;
}

.form{
margin-top:30px;
}

input,select{
width:100%;
padding:14px;
margin:10px 0;
border-radius:10px;
border:none;
font-size:16px;
}

button{
width:100%;
padding:15px;
background:#ffb400;
border:none;
border-radius:12px;
font-size:18px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#ffc940;
}

</style>

</head>

<body>

<div class="container">

<h1>Explorer Math Tower</h1>
<h2>برج التحدي الرياضي</h2>

<div class="game-preview">
<img src="images/tower_game_scene.png">
</div>

<div class="game-preview">
<img src="images/tower_main.png">
</div>

<div class="game-preview">
<img src="images/tower_path.png">
</div>

<div class="game-preview">
<img src="images/tower_forest.png">
</div>

<div class="game-preview">
<img src="images/tower_treasure.png">
</div>

<div class="form">

<input id="name" placeholder="اسم الطالب">

<input id="email" placeholder="البريد الإلكتروني">

<select id="class">

<option value="">اختر الصف</option>
<option>١١ / ٣</option>
<option>١١ / ٤</option>

</select>

<button onclick="startGame()">ابدأ اللعب</button>

</div>

</div>

<script>

function startGame(){

let name=document.getElementById("name").value;
let email=document.getElementById("email").value;
let cls=document.getElementById("class").value;

if(name=="" || email=="" || cls==""){
alert("أدخل جميع البيانات");
return;
}

window.location="game.html";

}

</script>

</body>
</html>
